<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPGA Fantasy Golf League</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-abbr">SPGA Fantasy</span>
        <div class="brand-text">
          <span class="brand-full">Sub-Par Golf Association Fantasy Golf League</span>
          <span class="brand-season">2026 Season · League Dashboard</span>
        </div>
      </div>
      <div class="header-actions">
        <span id="loading-indicator" class="loading-dot">●</span>
        <span id="last-updated" class="last-updated"></span>
        <button id="refresh-btn" class="refresh-btn" title="Refresh scores" ontouchstart="">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2v4h-4"/>
            <path d="M1 12v-4h4"/>
            <path d="M11.5 5A5 5 0 1 0 12 9"/>
          </svg>
          Refresh
        </button>
      </div>
    </div>
  </header>

  <!-- ========== TOURNAMENT BANNER ========== -->
  <section class="tournament-banner">
    <div class="banner-inner">
      <div class="banner-info">
        <h1 id="tournament-name" class="tournament-name"></h1>
        <p id="tournament-loc" class="tournament-loc"></p>
        <p id="tournament-dates" class="tournament-dates"></p>
      </div>
      <div class="banner-nav">
        <button class="tourney-tab" data-key="the_masters"      onclick="switchTournament('the_masters')">Masters</button>
        <button class="tourney-tab" data-key="pga_championship" onclick="switchTournament('pga_championship')">PGA Champ</button>
        <button class="tourney-tab" data-key="us_open"          onclick="switchTournament('us_open')">U.S. Open</button>
        <button class="tourney-tab" data-key="the_open"         onclick="switchTournament('the_open')">The Open</button>
        <span class="nav-divider">|</span>
        <button class="tourney-tab field-view-tab" id="field-tab" onclick="toggleFieldView()">Field</button>
      </div>
    </div>
  </section>

  <!-- ========== LEADERBOARD ========== -->
  <main class="leaderboard-wrap" id="leaderboard-main">
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th class="th-rank">POS</th>
          <th class="th-name">MANAGER</th>
          <th class="th-pts th-sortable sort-active" data-sort="points" onclick="setSortBy('points')">
            <span class="th-long">POINTS</span><span class="th-short">PTS</span><span class="sort-arrow">▼</span>
          </th>
          <th class="th-score th-sortable" data-sort="bestball" onclick="setSortBy('bestball')">
            <span class="th-long">BEST BALL</span><span class="th-short">BB</span><span class="sort-arrow">▼</span>
          </th>
          <th id="th-combined" class="th-score th-sortable" data-sort="combined" onclick="setSortBy('combined')" style="display:none">
            <span class="th-long">COMBINED</span><span class="th-short">COMB</span><span class="sort-arrow">▼</span>
          </th>
          <th class="th-expand"></th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr>
          <td colspan="6" class="loading-cell">Loading scores…</td>
        </tr>
      </tbody>
    </table>
  </main>

  <!-- ========== FIELD VIEW ========== -->
  <section class="leaderboard-wrap" id="field-view" style="display:none">
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th class="th-rank">POS</th>
          <th class="th-name">GOLFER</th>
          <th class="th-pts th-field-sortable" data-field-sort="pts" onclick="setFieldSortBy('pts')">
            <span class="th-long">POINTS</span><span class="th-short">PTS</span><span class="sort-arrow">▼</span>
          </th>
          <th class="th-score th-field-sortable sort-active" data-field-sort="score" onclick="setFieldSortBy('score')">
            <span class="th-long">SCORE</span><span class="th-short">SCR</span><span class="sort-arrow">▼</span>
          </th>
          <th class="th-expand"></th>
        </tr>
      </thead>
      <tbody id="field-body">
        <tr><td colspan="5" class="loading-cell">Loading…</td></tr>
      </tbody>
    </table>
  </section>

  <!-- ========== POINTS GUIDE ========== -->
  <div class="points-guide-container">
    <div id="points-guide-popup" class="points-guide-popup"></div>
    <button class="points-guide-btn" onclick="togglePointsGuide(event)">Points Guide</button>
  </div>

  <!-- ========== COMBINED TOGGLE ========== -->
  <div class="combined-toggle-container">
    <button id="combined-toggle-btn" class="combined-toggle-btn" onclick="toggleCombined()">Show Combined Scores</button>
  </div>

  <!-- ========== FOOTER ========== -->
  <footer class="site-footer">
    <div>Live scores via ESPN API</div>
    <div>Created by Max Housner · 2026</div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>

</body>
</html>
