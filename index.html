<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPGA — Sub-Par Golf Association</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== HEADER ========== -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <span class="brand-abbr">SPGA</span>
        <div class="brand-text">
          <span class="brand-full">Sub-Par Golf Association</span>
          <span class="brand-season">2026 Season · Majors League</span>
        </div>
      </div>
      <div class="header-actions">
        <span id="loading-indicator" class="loading-dot" style="display:none">●</span>
        <span id="last-updated" class="last-updated"></span>
        <button id="refresh-btn" class="refresh-btn" title="Refresh scores">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2v4h-4"/>
            <path d="M1 12v-4h4"/>
            <path d="M11.5 5A5 5 0 1 0 12 9"/>
          </svg>
          Refresh
        </button>
      </div>
    </div>
  </header>

  <!-- ========== TOURNAMENT BANNER ========== -->
  <section class="tournament-banner">
    <div class="banner-inner">
      <!-- <div class="banner-flag">MAJOR</div> -->
      <div class="banner-info">
        <h1 id="tournament-name" class="tournament-name">—</h1>
        <p id="tournament-meta" class="tournament-meta"></p>
      </div>
      <div class="banner-nav">
        <button class="tourney-tab" onclick="switchTournament('the_masters')">The Masters</button>
        <button class="tourney-tab" onclick="switchTournament('pga_championship')">PGA Champ.</button>
        <button class="tourney-tab" onclick="switchTournament('us_open')">U.S. Open</button>
        <button class="tourney-tab" onclick="switchTournament('the_open')">The Open</button>
      </div>
    </div>
  </section>

  <!-- ========== ERROR BANNER ========== -->
  <div id="error-banner" class="error-banner" style="display:none"></div>

  <!-- ========== LEADERBOARD ========== -->
  <main class="leaderboard-wrap">
    <table class="leaderboard-table">
      <thead>
        <tr>
          <th class="th-rank">POS</th>
          <th class="th-name">MANAGER</th>
          <th class="th-score">COMBINED</th>
          <th class="th-score">BEST BALL</th>
          <th class="th-golfer">BB LEADER</th>
          <th class="th-expand"></th>
        </tr>
      </thead>
      <tbody id="leaderboard-body">
        <tr>
          <td colspan="6" class="loading-cell">Loading scores…</td>
        </tr>
      </tbody>
    </table>
  </main>

  <!-- ========== FOOTER ========== -->
  <footer class="site-footer">
    <span>Created by Max Housner · 2026 · Live scores via ESPN</span>
  </footer>

  <!-- Scripts: data.js must load before app.js -->
  <script src="data.js"></script>
  <script src="app.js"></script>

  <!-- Tournament switcher (needs ACTIVE_TOURNAMENT to be mutable) -->
  <script>
    function switchTournament(key) {
      // Update the active tournament and re-fetch
      window.ACTIVE_TOURNAMENT = key;

      // Highlight active tab
      document.querySelectorAll('.tourney-tab').forEach((btn, i) => {
        const keys = ['the_masters', 'pga_championship', 'us_open', 'the_open'];
        btn.classList.toggle('active', keys[i] === key);
      });

      // Reset expanded state and re-init
      if (window.state) window.state.expandedManager = null;
      fetchScores();
    }

    // Set initial active tab on load
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.tourney-tab').forEach((btn, i) => {
        const keys = ['the_masters', 'pga_championship', 'us_open', 'the_open'];
        btn.classList.toggle('active', keys[i] === ACTIVE_TOURNAMENT);
      });
    });
  </script>

</body>
</html>
